<svg width="190" height="75" viewBox="0 0 190 75" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="compositeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b6b"/>
      <stop offset="100%" style="stop-color:#ee5a24"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect x="0" y="0" width="190" height="75" rx="10" fill="url(#compositeGradient)"/>
  
  <!-- Composite Icon Background -->
  <rect x="15" y="15" width="45" height="45" rx="8" fill="rgba(255,255,255,0.2)"/>
  
  <!-- Store Icon -->
  <text x="37" y="45" text-anchor="middle" font-size="20">🏪</text>
  
  <!-- Network Icon (small) -->
  <circle cx="50" cy="25" r="8" fill="white"/>
  <text x="50" y="29" text-anchor="middle" font-size="8">🌐</text>
  
  <!-- Arabic Text -->
  <text x="75" y="35" fill="white" font-family="Arial" font-size="17" font-weight="bold">حراج سوريا</text>
  
  <!-- English Text -->
  <text x="75" y="52" fill="white" font-family="Arial" font-size="11" opacity="0.9">Haraj Syria</text>
</svg>