<svg width="320" height="100" viewBox="0 0 320 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradientEn" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3c72"/>
      <stop offset="100%" style="stop-color:#2a5298"/>
    </linearGradient>
    <linearGradient id="textAreaGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2a5298"/>
      <stop offset="100%" style="stop-color:#1e3c72"/>
    </linearGradient>
    <filter id="shadow3D" x="-30%" y="-30%" width="160%" height="160%">
      <feMorphology operator="dilate" radius="1"/>
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge> 
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/> 
      </feMerge>
    </filter>
    <filter id="emboss" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur"/>
      <feSpecularLighting in="blur" result="specOut" surfaceScale="5" specularConstant="0.75" specularExponent="20" lighting-color="white">
        <fePointLight x="-50" y="-50" z="200"/>
      </feSpecularLighting>
      <feComposite in="specOut" in2="SourceAlpha" operator="in" result="specOut2"/>
      <feComposite in="SourceGraphic" in2="specOut2" operator="arithmetic" k1="0" k2="1" k3="1" k4="0"/>
    </filter>
  </defs>
  
  <!-- 3D Shadow Base -->
  <rect x="4" y="4" width="316" height="96" rx="20" fill="rgba(0,0,0,0.3)"/>
  
  <!-- Main Background with emboss effect -->
  <rect x="0" y="0" width="316" height="96" rx="20" fill="url(#bgGradientEn)" stroke="#d4af37" stroke-width="3" filter="url(#emboss)"/>
  
  <!-- Traditional Arch Icon Area -->
  <rect x="10" y="10" width="80" height="76" rx="15" fill="rgba(212, 175, 55, 0.1)" stroke="#d4af37" stroke-width="1.5"/>
  
  <!-- Traditional Arch Icon - Enhanced -->
  <path d="M 20 15 Q 20 5, 35 5 Q 50 5, 65 5 Q 80 5, 80 15 L 80 70 Q 80 80, 70 80 L 30 80 Q 20 80, 20 70 Z" fill="url(#textAreaGradient)" stroke="#d4af37" stroke-width="2" filter="url(#shadow3D)"/>
  <path d="M 30 20 Q 30 10, 35 10 Q 50 10, 65 10 Q 70 10, 70 20 L 70 60 Q 70 65, 65 65 L 35 65 Q 30 65, 30 60 Z" fill="#1e3c72"/>
  
  <!-- Decorative Islamic pattern in arch -->
  <circle cx="50" cy="25" r="4" fill="#d4af37" filter="url(#shadow3D)"/>
  <circle cx="42" cy="35" r="2.5" fill="#d4af37"/>
  <circle cx="58" cy="35" r="2.5" fill="#d4af37"/>
  <circle cx="50" cy="45" r="3" fill="#d4af37"/>
  <circle cx="50" cy="55" r="2" fill="#d4af37"/>
  
  <!-- Traditional arch details -->
  <path d="M 35 25 Q 50 20, 65 25" stroke="#d4af37" stroke-width="2" fill="none"/>
  <path d="M 35 45 Q 50 40, 65 45" stroke="#d4af37" stroke-width="1.5" fill="none"/>
  
  <!-- Text Area Frame -->
  <rect x="100" y="25" width="205" height="50" rx="10" fill="rgba(212, 175, 55, 0.1)" stroke="#d4af37" stroke-width="2" filter="url(#shadow3D)"/>
  
  <!-- English Text with 3D effect -->
  <text x="110" y="58" fill="#d4af37" font-family="serif" font-size="32" font-weight="bold" text-anchor="start" opacity="0.5">Haraj Syria</text>
  <text x="108" y="56" fill="white" font-family="serif" font-size="32" font-weight="bold" text-anchor="start" filter="url(#shadow3D)">Haraj Syria</text>
</svg>