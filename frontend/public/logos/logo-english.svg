<svg width="300" height="100" viewBox="0 0 300 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradientEn" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3c72"/>
      <stop offset="100%" style="stop-color:#2a5298"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <dropShadow dx="3" dy="3" stdDeviation="3" flood-opacity="0.4"/>
    </filter>
  </defs>
  
  <!-- Background with shadow -->
  <rect x="0" y="0" width="300" height="100" rx="20" fill="url(#bgGradientEn)" stroke="#d4af37" stroke-width="4" filter="url(#shadow)"/>
  
  <!-- Traditional Arch Icon - Much Larger and More Detailed -->
  <path d="M 20 10 Q 20 2, 35 2 Q 50 2, 65 2 Q 80 2, 80 10 L 80 70 Q 80 80, 70 80 L 30 80 Q 20 80, 20 70 Z" fill="#d4af37" stroke="#b8860b" stroke-width="2"/>
  <path d="M 30 20 Q 30 10, 35 10 Q 50 10, 65 10 Q 70 10, 70 20 L 70 60 Q 70 65, 65 65 L 35 65 Q 30 65, 30 60 Z" fill="#1e3c72"/>
  
  <!-- Decorative Islamic pattern in arch -->
  <circle cx="50" cy="25" r="4" fill="#d4af37"/>
  <circle cx="42" cy="35" r="2.5" fill="#d4af37"/>
  <circle cx="58" cy="35" r="2.5" fill="#d4af37"/>
  <circle cx="50" cy="45" r="3" fill="#d4af37"/>
  <circle cx="50" cy="55" r="2" fill="#d4af37"/>
  
  <!-- Traditional arch details -->
  <path d="M 35 25 Q 50 20, 65 25" stroke="#d4af37" stroke-width="2" fill="none"/>
  <path d="M 35 45 Q 50 40, 65 45" stroke="#d4af37" stroke-width="1.5" fill="none"/>
  
  <!-- English Text - Same size as before -->
  <text x="95" y="60" fill="white" font-family="serif" font-size="32" font-weight="bold" text-anchor="start">Haraj Syria</text>
</svg>