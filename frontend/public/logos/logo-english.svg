<svg width="240" height="80" viewBox="0 0 240 80" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradientEn" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3c72"/>
      <stop offset="100%" style="stop-color:#2a5298"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <dropShadow dx="2" dy="2" stdDeviation="2" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Background with shadow -->
  <rect x="0" y="0" width="240" height="80" rx="15" fill="url(#bgGradientEn)" stroke="#d4af37" stroke-width="3" filter="url(#shadow)"/>
  
  <!-- Traditional Arch Icon - Larger -->
  <path d="M 25 12 Q 25 5, 35 5 Q 45 5, 45 12 L 45 50 Q 45 55, 40 55 L 30 55 Q 25 55, 25 50 Z" fill="#d4af37"/>
  <path d="M 30 18 Q 30 12, 35 12 Q 40 12, 40 18 L 40 40 Q 40 42, 38 42 L 32 42 Q 30 42, 30 40 Z" fill="#1e3c72"/>
  
  <!-- Decorative pattern in arch -->
  <circle cx="35" cy="25" r="2" fill="#d4af37"/>
  <circle cx="35" cy="32" r="1.5" fill="#d4af37"/>
  
  <!-- English Text - Larger and clearer -->
  <text x="65" y="48" fill="white" font-family="serif" font-size="24" font-weight="bold" text-anchor="start" text-shadow="2px 2px 4px rgba(0,0,0,0.5)">Haraj Syria</text>
</svg>