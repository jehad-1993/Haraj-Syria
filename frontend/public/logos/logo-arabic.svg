<svg width="300" height="100" viewBox="0 0 300 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradientAr" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3c72"/>
      <stop offset="100%" style="stop-color:#2a5298"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <dropShadow dx="3" dy="3" stdDeviation="3" flood-opacity="0.4"/>
    </filter>
  </defs>
  
  <!-- Background with shadow -->
  <rect x="0" y="0" width="300" height="100" rx="20" fill="url(#bgGradientAr)" stroke="#d4af37" stroke-width="4" filter="url(#shadow)"/>
  
  <!-- Traditional Arch Icon - Much Larger -->
  <path d="M 30 15 Q 30 5, 45 5 Q 60 5, 60 15 L 60 65 Q 60 75, 50 75 L 40 75 Q 30 75, 30 65 Z" fill="#d4af37"/>
  <path d="M 38 25 Q 38 15, 45 15 Q 52 15, 52 25 L 52 55 Q 52 58, 49 58 L 41 58 Q 38 58, 38 55 Z" fill="#1e3c72"/>
  
  <!-- Decorative pattern in arch - larger -->
  <circle cx="45" cy="30" r="3" fill="#d4af37"/>
  <circle cx="45" cy="40" r="2" fill="#d4af37"/>
  <circle cx="45" cy="48" r="2" fill="#d4af37"/>
  
  <!-- Arabic Text - Much Larger and bolder -->
  <text x="80" y="60" fill="white" font-family="serif" font-size="36" font-weight="bold" text-anchor="start">حراج سوريا</text>
</svg>